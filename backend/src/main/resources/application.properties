spring.application.name=fit-trends-backend
server.port=${PORT:8080}

# MongoDB — override SPRING_DATA_MONGODB_URI env var on Railway
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/fittrends_db}
spring.data.mongodb.database=fittrends_db

# ML (Flask) server — override ML_SERVER_URL env var on Railway
ml.server.url=${ML_SERVER_URL:http://localhost:5000}

# Serve built React frontend from classpath:/static/
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
